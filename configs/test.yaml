# Default config for ParticleCTM on JetClass.

data:
  # Adjust these globs once your downloads finish.
  train_glob: datasets/example/JetClass_example_100k.root
  val_glob:   datasets/example/JetClass_example_100k_val.root
  test_glob:  datasets/example/JetClass_example_100k_test.root
  max_num_particles: 128
  num_workers: 4
  # See default.yaml for the rationale; example file is single-file so K=1.
  shuffle_buffer_size: 5000
  num_concurrent_files: 1
  rows_per_file_visit: null   # only one file → just use everything

model:
  input_dim: 17
  num_classes: 10
  pair_input_dim: 4
  pair_extra_dim: 0
  embed_dims: [256, 512, 256]
  pair_embed_dims: [64, 64, 64]
  use_pre_activation_pair: false
  num_heads: 16
  iterations: 48
  memory_length: 16
  d_model_qkv: 128
  d_model_o: 128
  n_synch_qkv: 16
  n_synch_o: 16
  dropout: 0.0
  trim: true
  fc_params: []
  activation: gelu

train:
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 1.0e-4
  warmup_steps: 2000
  total_steps: 100000
  log_every: 50
  val_every: 500
  seed: 42
  use_amp: true
  grad_clip: 5.0

ray:
  num_workers: 4         # number of GPUs
  use_gpu: true
  resources_per_worker:
    CPU: 8
    GPU: 1

wandb:
  project: particle-ctm-jetclass-test
  entity: null
  mode: online           # online | offline | disabled

output:
  # Where checkpoints, wandb run files, and a config snapshot are written.
  # Relative paths are resolved against the directory containing this yaml.
  dir: runs
  # Optional fixed run name. If null, a timestamp-based name is generated.
  run_name: null
  ckpt_name: best.pt
  save_last: true        # also write last.pt at end-of-training
