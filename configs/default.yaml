# Default config for ParticleCTM on JetClass.

data:
  # Adjust these globs once your downloads finish.
  train_glob: datasets/JetClass/Pythia/train_100M/*.root
  val_glob:   datasets/JetClass/Pythia/val_5M/*.root
  test_glob:  datasets/JetClass/Pythia/test_20M/*.root
  max_num_particles: 128
  num_workers: 4
  # Rows held in the streaming shuffle buffer per DataLoader worker. Each
  # JetClass shard file is class-pure (HToBB_*.root etc.), so we mix this
  # many rows across many files before yielding to guarantee class-diverse
  # batches. 0 disables (eval). ~11 KB per row × buffer_size × workers.
  shuffle_buffer_size: 20000
  # ROOT files held open at once per worker. PyTorch's IterableDataset
  # guarantees each batch comes from ONE worker, so K must be ≥ num_classes
  # if you want every batch to contain all classes. JetClass has 10 classes.
  num_concurrent_files: 10
  # Per-file row cap. Each slot holds only this many rows (subsampled, copied
  # out, parent freed). Required when K is large: K=10 with full files would
  # use ~11 GB per worker × 16 workers = 176 GB. With 10000 rows per visit,
  # slot footprint drops to ~110 MB × K × workers ≈ 18 GB total. Set to null
  # for full-file coverage per visit if you have the RAM.
  rows_per_file_visit: 10000

model:
  input_dim: 17
  num_classes: 10
  pair_input_dim: 4
  pair_extra_dim: 0
  embed_dims: [128, 512, 128]
  pair_embed_dims: [64, 64, 64]
  use_pre_activation_pair: false
  num_heads: 8
  iterations: 45
  memory_length: 15
  d_model_qkv: 128
  d_model_o: 128
  n_synch_qkv: 16
  n_synch_o: 16
  dropout: 0.0
  trim: true
  fc_params: []
  activation: gelu

train:
  batch_size: 256
  lr: 2.0e-4
  weight_decay: 1.0e-4
  warmup_steps: 300
  total_steps: 50000
  log_every: 50
  val_every: 500
  seed: 42
  use_amp: true
  grad_clip: 5.0
  # Gradient checkpointing on the CTM tick loop. Trades ~30-40% training time
  # for huge activation memory savings (O(T) → O(1) ticks held in memory).
  # Required at T=45, B=256 on 80 GB GPUs; set false only for small models.
  use_grad_checkpoint: true

ray:
  num_workers: 4         # number of GPUs
  use_gpu: true
  resources_per_worker:
    CPU: 8
    GPU: 1

wandb:
  project: particle-ctm-jetclass
  entity: null
  mode: online           # online | offline | disabled

output:
  # Where checkpoints, wandb run files, and a config snapshot are written.
  # Relative paths are resolved against the directory containing this yaml.
  dir: runs
  # Optional fixed run name. If null, a timestamp-based name is generated.
  run_name: null
  ckpt_name: best.pt
  save_last: true        # also write last.pt at end-of-training
